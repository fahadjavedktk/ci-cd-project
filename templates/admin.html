{% extends "base.html" %}
{% block content %}

<h2 class="mb-4">🛠 Admin Panel</h2>

<div class="row">

<!-- ADD PATIENT -->
<div class="col-md-5">
<div class="card p-3 shadow">

<h5>Add Patient</h5>

<label>Name</label>
<input id="name" class="form-control" placeholder="Enter patient name">

<label class="mt-2">Age</label>
<input id="age" class="form-control" placeholder="Enter age">

<label class="mt-2">Doctor</label>
<input id="doctor" class="form-control" placeholder="Assign doctor">

<button onclick="addPatient()" class="btn btn-success mt-3 w-100">
➕ Add Patient
</button>

</div>
</div>

<!-- PATIENT LIST -->
<div class="col-md-7">
<div class="card p-3 shadow">

<h5>Patient List</h5>

<ul id="list" class="list-group mt-2"></ul>

</div>
</div>

</div>

<script>

async function addPatient(){
await fetch('/add_patient',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
name:document.getElementById("name").value,
age:document.getElementById("age").value,
doctor:document.getElementById("doctor").value
})
});
load();
}

async function load(){
let r=await fetch('/patients');
let data=await r.json();

list.innerHTML="";

data.forEach(p=>{
let li=document.createElement("li");
li.className="list-group-item d-flex justify-content-between align-items-center";

li.innerHTML=`${p.name} | Age: ${p.age} | Doctor: ${p.doctor}`;

let btn=document.createElement("button");
btn.className="btn btn-danger btn-sm";
btn.innerText="Delete";

btn.onclick=async()=>{
await fetch('/delete_patient/'+p.id,{method:'DELETE'});
load();
};

li.appendChild(btn);
list.appendChild(li);
});
}

load();

</script>

{% endblock %}
